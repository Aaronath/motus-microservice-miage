server:
  port: 8082

spring:
  application:
    name: game-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/motus_games
    username: ${DB_USER:motus}
    password: ${DB_PASSWORD:motus}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

motus:
  jwt:
    secret: ${JWT_SECRET:motus-miage-sitn-2026-secret-key-min-32-chars!!}
    expiration-ms: 86400000
  dictionary:
    url: ${DICTIONARY_URL:http://localhost:8083}
  stats:
    url: ${STATS_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info
