apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: motus/api-gateway:1.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: motus-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: motus
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      nodePort: 30080
