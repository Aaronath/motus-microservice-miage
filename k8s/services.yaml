apiVersion: apps/v1
kind: Deployment
metadata:
  name: dictionary-service
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dictionary-service
  template:
    metadata:
      labels:
        app: dictionary-service
    spec:
      containers:
        - name: dictionary-service
          image: motus/dictionary-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: DB_HOST
              value: postgres-dictionary
            - name: DB_USER
              value: motus
            - name: DB_PASSWORD
              value: motus
---
apiVersion: v1
kind: Service
metadata:
  name: dictionary-service
  namespace: motus
spec:
  selector:
    app: dictionary-service
  ports:
    - port: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: player-service
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: player-service
  template:
    metadata:
      labels:
        app: player-service
    spec:
      containers:
        - name: player-service
          image: motus/player-service:1.0
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: motus-config
          env:
            - name: DB_HOST
              value: postgres-players
---
apiVersion: v1
kind: Service
metadata:
  name: player-service
  namespace: motus
spec:
  selector:
    app: player-service
  ports:
    - port: 8081
---
