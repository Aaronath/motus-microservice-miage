apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-players
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-players
  template:
    metadata:
      labels:
        app: postgres-players
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: motus_players
            - name: POSTGRES_USER
              value: motus
            - name: POSTGRES_PASSWORD
              value: motus
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-players
  namespace: motus
spec:
  selector:
    app: postgres-players
  ports:
    - port: 5432
